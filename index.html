<!DOCTYPE html>
<html>
<head>
    <title>FSI Data Analysis Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #1e1e2e;
            color: white;
            text-align: center;
        }

        h1 {
            color: #3498db;
            padding: 20px;
        }

        .kpi {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            width: 180px;
        }

        .card h2 {
            color: #3498db;
            font-size: 28px;
        }

        .card p {
            color: #bdc3c7;
            font-size: 12px;
        }

        img {
            width: 80%;
            margin: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>🌍 FSI Data Analysis Dashboard</h1>
    <p>AI & ML Internship Project</p>

    <div class="kpi">

        <div class="card">
            <h2>178</h2>
            <p>Total Countries</p>
        </div>

        <div class="card">
            <h2>3170</h2>
            <p>Total Records</p>
        </div>

        <div class="card">
            <h2>75.4</h2>
            <p>Average FSI Score</p>
        </div>

        <div class="card">
            <h2>45</h2>
            <p>High Risk Countries</p>
        </div>

        <div class="card">
            <h2>82</h2>
            <p>Medium Risk Countries</p>
        </div>

        <div class="card">
            <h2>51</h2>
            <p>Low Risk Countries</p>
        </div>

    </div>

    <h2>📊 Analysis Charts</h2>

    <img src="images/risk_distribution.png"
         alt="Risk Distribution">

    <img src="images/top_fragile_countries.png"
         alt="Top Fragile Countries">

    <img src="images/top_stable_countries.png"
         alt="Top Stable Countries">

    <img src="images/global_fsi_trend.png"
         alt="Global FSI Trend">

    <img src="images/correlation_heatmap.png"
         alt="Correlation Heatmap">

</body>
</html>
